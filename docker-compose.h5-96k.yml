# H5 push #1 — bump max-model-len to 96k (98304).
# Math: ~9 GB KV @ 96k + 17 GB weights + 3 GB workspace ≈ 29 GB.
# Fits at gpu-memory-utilization=0.92 (30 GB budget).

services:
  vllm:
    command:
      - "--model=${VLLM_MODEL:-cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit}"
      - "--served-model-name=${VLLM_SERVED_NAME:-gemma-4-26b-a4b-it}"
      - "--max-model-len=98304"
      - "--max-num-batched-tokens=8192"
      - "--gpu-memory-utilization=0.92"
      - "--dtype=auto"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser=${VLLM_TOOL_PARSER:-gemma4}"
