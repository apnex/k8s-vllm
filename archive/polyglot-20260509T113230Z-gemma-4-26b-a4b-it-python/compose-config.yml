name: vllm
services:
  vllm:
    command:
      - --model=cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
      - --served-model-name=gemma-4-26b-a4b-it
      - --max-model-len=32768
      - --max-num-batched-tokens=8192
      - --gpu-memory-utilization=0.90
      - --dtype=auto
      - --enable-auto-tool-choice
      - --tool-call-parser=gemma4
    container_name: aorus-vllm
    environment:
      HF_HOME: /root/.cache/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      NVIDIA_VISIBLE_DEVICES: all
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fs http://127.0.0.1:8000/health || exit 1
      timeout: 5s
      interval: 30s
      retries: 5
      start_period: 30m0s
    image: vllm/vllm-openai:v0.20.2
    ipc: host
    networks:
      default: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 8000
        published: "8000"
        protocol: tcp
    restart: unless-stopped
    runtime: nvidia
    shm_size: "17179869184"
    volumes:
      - type: bind
        source: /root/.cache/huggingface
        target: /root/.cache/huggingface
        bind: {}
      - type: bind
        source: /root/.cache/vllm
        target: /root/.cache/vllm
        bind: {}
networks:
  default:
    name: vllm_default
