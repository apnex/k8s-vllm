apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: vllm-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.251/32
  autoAssign: true
  avoidBuggyIPs: false
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: vllm-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - vllm-pool
